name: ClaudeSessionManager
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    macOS: "12.0"
targets:
  ClaudeSessionManager:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.session-manager
        PRODUCT_NAME: Claude
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
